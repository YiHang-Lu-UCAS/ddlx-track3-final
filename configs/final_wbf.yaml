model_rerun:
  variant: fake_nobox_nose_eyes_mouth
  mode: input_images_to_json
classification:
  model: ConvNeXt-B face-level binary classifier
  image_aggregation: max(face_fake_probability)
  fake_threshold: 0.20
wbf:
  models: [detector_a_fullmask_stageb, detector_b_conservative_stageb, detector_c_yolov8m_stageb]
  weights:
    detector_a_fullmask_stageb: 0.7
    detector_b_conservative_stageb: 1.35
    detector_c_yolov8m_stageb: 1.0
  pre_conf: 0.125
  wbf_iou: 0.35
  post_conf: 0.175
  max_boxes: 3
  require_models: 2
fallback:
  selected_variant: fake_nobox_nose_eyes_mouth
  boxes: [nose, left_eye, right_eye, mouth]
text:
  mode: qwen_model_rerun
  model: Qwen2.5-VL-3B-Instruct
  adapter: qwen2_5_vl_3b_lora_checkpoint1500
  max_new_tokens: 2048
  decoding: greedy
